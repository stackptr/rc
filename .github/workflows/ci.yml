name: CI

on:
  pull_request:
  push:
    branches: main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: glyph
            system: x86_64-linux
            runner: ubuntu-latest
          - host: Rhizome
            system: aarch64-darwin
            runner: macos-latest
          - host: spore
            system: x86_64-linux
            runner: ubuntu-latest
          - host: zeta
            system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure Attic cache
      run: |
        nix profile install github:zhaofengli/attic#attic-client
        attic login rc https://cache.zx.dev ${{ secrets.ATTIC_TOKEN }}
        attic use rc:main
    - run: nix flake check
    - name: Build system configuration
      run: |
        if [ "${{ matrix.system }}" = "aarch64-darwin" ]; then
          nix build .#darwinConfigurations.${{ matrix.host }}.system
        else
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
        fi
    - name: Push to Attic
      if: github.ref == 'refs/heads/main'
      run: attic push rc:main ./result
